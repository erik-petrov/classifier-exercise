spring.application.name=classifier-exercise

spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=document
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/classifier
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123123}

spring.jpa.properties.hibernate.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=document

spring.sql.init.mode=never